<svg viewBox="0 0 300 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Caffeine molecule — three methyl groups, the three 3s of GT3">
  <!-- Caffeine (1,3,7-trimethylxanthine): a purine — a six-membered pyrimidinedione fused to a
       five-membered imidazole, with THREE methyl groups (the three 3s) and two carbonyls. Skeleton
       is topologically faithful; the three N-methyls are highlighted in GT3 red. Cream/gold on dark. -->
  <g fill="none" stroke="#F5F1E8" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- six-membered ring: C5-C6-N1-C2-N3-C4 -->
    <path d="M150 90 L98 60 L46 90 L46 150 L98 180 L150 150 Z"/>
    <!-- five-membered ring: C5-N7-C8-N9-C4 (shares the C5-C4 edge) -->
    <path d="M150 90 L208 72 L244 120 L208 168 L150 150"/>
    <!-- carbonyls (double bonds to O) -->
    <line x1="94" y1="56" x2="94" y2="26"/><line x1="102" y1="56" x2="102" y2="26"/>
    <line x1="42" y1="150" x2="16" y2="164"/><line x1="46" y1="156" x2="20" y2="170"/>
    <!-- imidazole double bond (C8=N9) -->
    <line x1="240" y1="126" x2="212" y2="164"/><line x1="246" y1="130" x2="218" y2="168"/>
  </g>
  <!-- O atoms -->
  <g font-family="'DM Mono',ui-monospace,monospace" font-size="18" fill="#C8A661" text-anchor="middle">
    <text x="98" y="20">O</text>
    <text x="10" y="178">O</text>
    <text x="256" y="126" fill="#F5F1E8">N</text>
  </g>
  <!-- ring N labels (quiet) -->
  <g font-family="'DM Mono',ui-monospace,monospace" font-size="14" fill="rgba(245,241,232,.55)" text-anchor="middle">
    <text x="40" y="86">N</text><text x="98" y="196">N</text><text x="214" y="66">N</text>
  </g>
  <!-- THE THREE 3s: the N-methyl groups, in GT3 red -->
  <g stroke="#B82420" stroke-width="2.6" stroke-linecap="round">
    <line x1="46" y1="90" x2="16" y2="72"/>
    <line x1="98" y1="180" x2="98" y2="214"/>
    <line x1="208" y1="72" x2="232" y2="42"/>
  </g>
  <g fill="#B82420" font-family="'Inter',sans-serif" font-weight="800" font-size="20" text-anchor="middle">
    <text x="10" y="70">3</text>
    <text x="98" y="230">3</text>
    <text x="238" y="40">3</text>
  </g>
</svg>
