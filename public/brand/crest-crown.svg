<svg width="122" height="86" viewBox="0 0 122 86" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Founding member crown">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2=".3" y2="1">
      <stop offset="0" stop-color="#FBEEC6"/><stop offset=".3" stop-color="#E4C070"/><stop offset=".62" stop-color="#B98F3F"/><stop offset="1" stop-color="#6E4F17"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8A6A28"/><stop offset="1" stop-color="#4E3910"/>
    </linearGradient>
    <radialGradient id="ruby" cx="38%" cy="30%" r="80%">
      <stop offset="0" stop-color="#FFC9C4"/><stop offset=".38" stop-color="#D93A34"/><stop offset=".8" stop-color="#9E1C18"/><stop offset="1" stop-color="#6E1210"/>
    </radialGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0"/><stop offset=".5" stop-color="#fff" stop-opacity=".8"/><stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <style>
      .g{transform-box:fill-box;transform-origin:center;animation:g 2.6s ease-in-out infinite}
      .g.b{animation-delay:.9s}.g.c{animation-delay:1.8s}
      @keyframes g{0%,100%{opacity:.45}50%{opacity:1}}
      .sw{animation:sw 4s ease-in-out infinite}
      @keyframes sw{0%,74%,100%{opacity:0}86%{opacity:.7}}
    </style>
  </defs>

  <!-- three-point regal crown (three, for GT3) — slim, metallic, refined -->
  <path d="M14 64 L21 33 L39 53 L61 22 L83 53 L101 33 L108 64 Z" fill="url(#gold)" stroke="url(#goldEdge)" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- right-side shadow for a little dimension -->
  <path d="M61 22 L83 53 L101 33 L108 64 L61 64 Z" fill="url(#goldEdge)" opacity=".28"/>
  <!-- bright top rim -->
  <path d="M21 33 L39 53 L61 22 L83 53 L101 33" fill="none" stroke="#FFF7E0" stroke-width="1" opacity=".75" stroke-linejoin="round"/>
  <!-- fine band with a beaded lower edge -->
  <rect x="14" y="61" width="94" height="15" rx="4" fill="url(#gold)" stroke="url(#goldEdge)" stroke-width="1.4"/>
  <rect x="16" y="62.5" width="90" height="4" rx="2" fill="#FFF7E0" opacity=".35"/>
  <g fill="#6E4F17" opacity=".45"><circle cx="22" cy="75" r="1"/><circle cx="31" cy="75" r="1"/><circle cx="40" cy="75" r="1"/><circle cx="49" cy="75" r="1"/><circle cx="61" cy="75" r="1"/><circle cx="73" cy="75" r="1"/><circle cx="82" cy="75" r="1"/><circle cx="91" cy="75" r="1"/><circle cx="100" cy="75" r="1"/></g>
  <!-- slim finials on each of the 3 peaks -->
  <circle cx="21" cy="33" r="3" fill="url(#gold)" stroke="url(#goldEdge)" stroke-width="1"/>
  <circle cx="61" cy="22" r="3.6" fill="url(#gold)" stroke="url(#goldEdge)" stroke-width="1"/>
  <circle cx="101" cy="33" r="3" fill="url(#gold)" stroke="url(#goldEdge)" stroke-width="1"/>

  <!-- 3 faceted red gems set into the crown, each with a live glint -->
  <g><path d="M31 47 l5 3 -5 6 -5-6z" fill="url(#ruby)" stroke="#7E1512" stroke-width=".5"/><path d="M31 47 l5 3 -5 1.6 -5-1.6z" fill="#FFD2CE" opacity=".55"/><circle class="g" cx="29.4" cy="48.4" r="1.1" fill="#fff"/></g>
  <g><path d="M61 40 l6.5 4 -6.5 8 -6.5-8z" fill="url(#ruby)" stroke="#7E1512" stroke-width=".6"/><path d="M61 40 l6.5 4 -6.5 2 -6.5-2z" fill="#FFD2CE" opacity=".55"/><circle class="g b" cx="58.8" cy="41.6" r="1.4" fill="#fff"/></g>
  <g><path d="M91 47 l5 3 -5 6 -5-6z" fill="url(#ruby)" stroke="#7E1512" stroke-width=".5"/><path d="M91 47 l5 3 -5 1.6 -5-1.6z" fill="#FFD2CE" opacity=".55"/><circle class="g c" cx="89.4" cy="48.4" r="1.1" fill="#fff"/></g>

  <rect class="sw" x="2" y="14" width="22" height="76" fill="url(#sweep)" transform="skewX(-16)"/>
</svg>
